name: refresh-pnl

on:
  schedule:
    # 03:00 UTC every Sunday
    - cron: '0 3 * * 0'
  workflow_dispatch:

concurrency:
  group: bot-state
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: pyproject.toml

      - name: Install
        run: pip install -e .

      - name: Restore state DB from bot-state branch
        run: bash scripts/_ci_state.sh restore

      - name: Refresh PnL
        env:
          LOG_LEVEL: INFO
          POLYMARKET_USER_AGENT: polymarket-smart-money/0.1 (+https://github.com/${{ github.repository }})
        run: python scripts/refresh_pnl.py

      - name: Persist state DB
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: bash scripts/_ci_state.sh save
